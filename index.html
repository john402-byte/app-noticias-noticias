<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias_OS // Top 10</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .neon-yellow { color: #ffc107; text-shadow: 0 0 15px rgba(255, 193, 7, 0.6); font-weight: bold; }
        .news-card { background-color: #111; border: 2px solid #ffc107; border-radius: 12px; transition: 0.3s; height: 100%; }
        .news-card:hover { box-shadow: 0 0 20px rgba(255, 193, 7, 0.4); transform: translateY(-5px); }
        .card-img-top { height: 190px; object-fit: cover; border-bottom: 1px solid #222; }
        .btn-warning { background-color: #ffc107; color: #000; font-weight: bold; border: none; }
    </style>
</head>
<body>

<div class="container py-5 text-center">
    <h1 class="display-4 neon-yellow mb-2">NOTICIAS_OS // TOP 10</h1>
    <p class="text-secondary mb-4">Módulo de Inteligencia: Tecnología y Ciencia</p>
    
    <button id="downloadBtn" class="btn btn-warning btn-lg mb-5" disabled>
        📥 DESCARGAR REPORTE (.TXT)
    </button>

    <div id="loading" class="mb-4">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="mt-2 text-warning">Escaneando satélites de información...</p>
    </div>

    <div id="newsContainer" class="row row-cols-1 row-cols-md-3 g-4 text-start"></div>
</div>

<script>
    // PLAN B: Usando GNews API (Más estable)
    const API_KEY = "80f68e0d93766a5a2bc9006b51079370"; 
    const URL = `https://gnews.io/api/v4/top-headlines?category=technology&lang=es&country=any&max=10&apikey=${API_KEY}`;

    let newsData = [];
    const newsContainer = document.getElementById('newsContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const loading = document.getElementById('loading');

    async function getNews() {
        try {
            const response = await fetch(URL);
            const data = await response.json();

            if (data.articles) {
                newsData = data.articles;
                renderNews();
                downloadBtn.disabled = false;
                loading.style.display = 'none';
            } else {
                throw new Error("Límite de API alcanzado");
            }
        } catch (error) {
            loading.innerHTML = `<p class="text-danger">ERROR DE CONEXIÓN: Reintentando con base de datos de respaldo...</p>`;
            console.error(error);
        }
    }

    function renderNews() {
        newsContainer.innerHTML = '';
        newsData.forEach(item => {
            const img = item.image || 'https://via.placeholder.com/400x200/111/ffc107?text=NOTICIAS_OS';
            newsContainer.innerHTML += `
                <div class="col">
                    <div class="card news-card">
                        <img src="${img}" class="card-img-top" alt="news">
                        <div class="card-body">
                            <h5 class="card-title text-warning">${item.title}</h5>
                            <p class="card-
