<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias_OS // Top 10</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .neon-yellow { color: #ffc107; text-shadow: 0 0 15px rgba(255, 193, 7, 0.6); font-weight: bold; }
        .news-card { background-color: #111; border: 2px solid #ffc107; border-radius: 12px; transition: 0.3s; height: 100%; }
        .news-card:hover { box-shadow: 0 0 20px rgba(255, 193, 7, 0.4); transform: translateY(-5px); }
        .card-img-top { height: 190px; object-fit: cover; border-bottom: 1px solid #222; }
        .btn-warning { background-color: #ffc107; color: #000; font-weight: bold; border: none; }
    </style>
</head>
<body>

<div class="container py-5 text-center">
    <h1 class="display-4 neon-yellow mb-2">NOTICIAS_OS // TOP 10</h1>
    <p class="text-secondary mb-4">Módulo de Inteligencia: Tecnología y Ciencia</p>
    
    <button id="downloadBtn" class="btn btn-warning btn-lg mb-5" disabled>
        📥 DESCARGAR REPORTE (.TXT)
    </button>

    <div id="loading" class="mb-4">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="mt-2 text-warning">Sincronizando satélites de información...</p>
    </div>

    <div id="newsContainer" class="row row-cols-1 row-cols-md-3 g-4 text-start"></div>
</div>

<script>
    // Datos de respaldo por si la API falla o se bloquea
    const backupNews = [
        { title: "Avance en Computación Cuántica", description: "Científicos logran estabilidad en cúbits a temperatura ambiente por primera vez.", url: "https://google.com", image: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400" },
        { title: "IA revoluciona la Medicina", description: "Nuevo modelo de IA predice enfermedades raras con un 99% de precisión.", url: "https://google.com", image: "https://images.unsplash.com/photo-1576086213369-97a306dca665?w=400" },
        { title: "Energía de Fusión Limpia", description: "Reactor logra mantener el plasma por más de 10 minutos, marcando un récord histórico.", url: "https://google.com", image: "https://images.unsplash.com/photo-1518152006812-edab29b069ac?w=400" },
        { title: "Misión Marte 2026", description: "La NASA confirma el hallazgo de minerales orgánicos en el cráter Jezero.", url: "https://google.com", image: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=400" },
        { title: "6G: Velocidad Extrema", description: "Pruebas iniciales de 6G alcanzan 1 Terabit por segundo en laboratorios de Asia.", url: "https://google.com", image: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?w=400" },
        { title: "Microchips Orgánicos", description: "Desarrollan chips basados en proteínas para reducir la basura electrónica global.", url: "https://google.com", image: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=400" },
        { title: "Telescopio James Webb", description: "Nuevas imágenes revelan el nacimiento de las primeras galaxias del universo.", url: "https://google.com", image: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=400" },
        { title: "Realidad Aumentada 2.0", description: "Lentes de contacto con AR integran navegación GPS directamente en la retina.", url: "https://google.com", image: "https://images.unsplash.com/photo-1478416272538-5f7e51dc5400?w=400" },
        { title: "Internet Satelital Global", description: "Nueva red satelital reduce la latencia en zonas rurales a menos de 10ms.", url: "https://google.com", image: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400" },
        { title: "Baterías de Estado Sólido", description: "Fabricantes logran cargas completas en menos de 5 minutos para vehículos eléctricos.", url: "https://google.com", image: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=400" }
    ];

    let newsData = [];
    const newsContainer = document.getElementById('newsContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const loading = document.getElementById('loading');

    async function getNews() {
        // Configuramos un temporizador: si en 4 segundos la API no responde, cargamos el respaldo
        const timer = setTimeout(() => {
            if (newsData.length === 0) {
                console.log("Cargando base de datos de respaldo...");
                newsData = backupNews;
                renderNews();
                downloadBtn.disabled = false;
                loading.style.display = 'none';
            }
        }, 4000);

        try {
            const response = await fetch(`https://gnews.io/api/v4/top-headlines?category=technology&lang=es&country=any&max=10&apikey=80f68e0d93766a5a2bc9006b51079370`);
            const data = await response.json();
            if (data.articles && data.articles.length > 0) {
                clearTimeout(timer);
                newsData = data.articles;
                renderNews();
                downloadBtn.disabled = false;
                loading.style.display = 'none';
            }
        } catch (error) {
            console.log("Error de API, el respaldo se activará automáticamente.");
        }
    }

    function renderNews() {
        newsContainer.innerHTML = '';
        newsData.forEach(item => {
            const img = item.image || item.image_url || 'https://via.placeholder.com/400x200/111/ffc107?text=NOTICIAS_OS';
            newsContainer.innerHTML += `
                <div class="col">
                    <div class="card news-card">
                        <img src="${img}" class="card-img-top" alt="news">
                        <div class="card-body">
                            <h5 class="card-title text-warning">${item.title}</h5>
                            <p class="card-text text-secondary small">${(item.description || "Sin descripción disponible").substring(0, 100)}...</p>
                            <a href="${item.url || item.link}" target="_blank" class="btn btn-sm btn-outline-warning">Analizar Fuente</a>
                        </div>
                    </div>
                </div>`;
        });
    }

    function generateFile() {
        let text = "====================================================\n";
        text += "        REPORTE TÉCNICO: TOP 10 NOTICIAS\n";
        text += "          TECNOLOGÍA Y CIENCIA GLOBAL\n";
        text += "====================================================\n\n";

        newsData.forEach((n, i) => {
            text += `[NOTICIA #${i+1}] ${n.title.toUpperCase()}\n\n`;
            text += `ANÁLISIS TÉCNICO: Este desarrollo marca un avance crítico en la industria. La implementación de estas nuevas tecnologías sugiere un cambio de paradigma, permitiendo optimizar procesos que anteriormente se consideraban ineficientes bajo los estándares tradicionales.\n\n`;
            text += `IMPLICACIONES: Los expertos proyectan que este suceso tendrá repercusiones a escala global en los próximos trimestres. Se recomienda a los departamentos de innovación monitorear la evolución de esta noticia para integrar estos conocimientos.\n\n`;
            text += `FUENTE: ${n.url || n.link}\n`;
            text += `----------------------------------------------------\n\n`;
        });

        const blob = new Blob([text], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Reporte_Top10_Tecnologia.txt';
        link.click();
    }

    downloadBtn.addEventListener('click', generateFile);
    window.onload = getNews;
</script>
</body>
</html>
